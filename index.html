<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Recipe Book (Secure)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cream: #FAF7F2; --cream-dark: #F0EBE1; --ink: #1A1714; --ink-mid: #4A4540;
      --ink-light: #8A8480; --accent: #C2440E; --accent-light: #F5E8E2;
      --border: rgba(26,23,20,0.12); --border-strong: rgba(26,23,20,0.25);
      --font-display: 'Playfair Display', Georgia, serif; --font-body: 'DM Sans', sans-serif;
      --radius: 4px; --radius-lg: 10px;
    }
    body { font-family: var(--font-body); background: var(--cream); color: var(--ink); min-height: 100vh; }
    header { border-bottom: 1px solid var(--border); padding: 0 2rem; background: var(--cream); position: sticky; top: 0; z-index: 10; }
    .header-inner { max-width: 960px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 64px; }
    .logo { font-family: var(--font-display); font-size: 22px; font-weight: 600; color: var(--ink); letter-spacing: -0.02em; }
    .logo span { color: var(--accent); }
    main { max-width: 960px; margin: 0 auto; padding: 2.5rem 2rem 4rem; }
    .page-intro { margin-bottom: 2.5rem; }
    .page-intro h1 { font-family: var(--font-display); font-size: clamp(32px, 5vw, 48px); font-weight: 500; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.5rem; }
    .page-intro p { font-size: 15px; color: var(--ink-light); font-weight: 300; }
    .toolbar { display: flex; align-items: center; justify-content: space-between; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .search-wrap { position: relative; flex: 1; min-width: 200px; max-width: 340px; }
    .search-wrap svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--ink-light); pointer-events: none; }
    .search-wrap input { width: 100%; padding: 9px 12px 9px 36px; border: 1px solid var(--border-strong); border-radius: var(--radius); font-size: 14px; outline: none; }
    .btn { font-family: var(--font-body); font-size: 14px; font-weight: 500; border-radius: var(--radius); cursor: pointer; transition: all 0.15s; padding: 9px 20px; border: none; white-space: nowrap; }
    .btn-primary { background: var(--ink); color: var(--cream); }
    .btn-primary:hover { background: var(--accent); }
    .btn-outline { background: transparent; border: 1px solid var(--border-strong); color: var(--ink-mid); }
    .btn-ghost { background: transparent; border: none; color: var(--ink-light); padding: 6px 10px; }
    .btn-danger { background: transparent; color: var(--accent); padding: 8px 16px; }
    .recipe-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1px; border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; background: var(--border); }
    .recipe-card { background: white; padding: 1.25rem 1.5rem; cursor: pointer; }
    .recipe-card:hover { background: var(--cream); }
    .card-tag { display: inline-block; font-size: 11px; font-weight: 500; text-transform: uppercase; color: var(--accent); margin-bottom: 8px; }
    .card-name { font-family: var(--font-display); font-size: 18px; font-weight: 500; margin-bottom: 6px; }
    .overlay { display: none; position: fixed; inset: 0; background: rgba(26,23,20,0.5); z-index: 100; align-items: center; justify-content: center; padding: 1rem; backdrop-filter: blur(2px); }
    .overlay.active { display: flex; }
    .modal { background: var(--cream); border-radius: var(--radius-lg); width: 100%; max-width: 560px; max-height: 90vh; overflow-y: auto; }
    .modal-head { padding: 1.5rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; position: sticky; top: 0; background: var(--cream); }
    .modal-body { padding: 1.5rem; }
    .modal-foot { padding: 1rem 1.5rem; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: var(--cream); }
    .field { margin-bottom: 1.1rem; }
    .field label { display: block; font-size: 12px; font-weight: 500; text-transform: uppercase; margin-bottom: 6px; }
    .field input, .field textarea { width: 100%; padding: 9px 12px; border: 1px solid var(--border-strong); border-radius: var(--radius); font-size: 14px; outline: none; }
    .pill { display: inline-flex; padding: 3px 10px; border-radius: 100px; border: 1px solid var(--border-strong); font-size: 12px; margin-right: 5px; }
    .accent { background: var(--accent-light); color: var(--accent); border: none; }
    .prep-text { white-space: pre-wrap; line-height: 1.6; }
    footer { text-align: center; padding: 40px; opacity: 0.4; }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">recipe<span>.</span></div>
    <button class="btn btn-primary" onclick="openAdd()">+ Add recipe</button>
  </div>
</header>

<main>
  <div class="page-intro">
    <h1>My recipe book</h1>
    <p>All your favorite recipes, in one place.</p>
  </div>

  <div class="toolbar">
    <div class="search-wrap">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="search" placeholder="Search recipes…" oninput="render()" />
    </div>
    <span class="count-badge" id="count"></span>
  </div>

  <div id="list"></div>
</main>

<footer>
  <button id="admin-btn" class="btn btn-ghost" onclick="login()">Admin Login</button>
</footer>

<div class="overlay" id="modal-add" onclick="overlayClick(event,'modal-add')">
  <div class="modal">
    <div class="modal-head">
      <h2 id="form-title">New recipe</h2>
      <button class="btn btn-ghost" onclick="closeModal('modal-add')">✕</button>
    </div>
    <div class="modal-body">
      <div class="field"><label>Name *</label><input type="text" id="f-name" /></div>
      <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
        <div class="field"><label>Category</label><input type="text" id="f-category" /></div>
        <div class="field"><label>Servings</label><input type="text" id="f-servings" /></div>
      </div>
      <div class="field"><label>Ingredients</label><textarea id="f-ingredients" rows="5"></textarea></div>
      <div class="field"><label>Preparation</label><textarea id="f-preparation" rows="5"></textarea></div>
    </div>
    <div class="modal-foot">
      <div></div>
      <div style="display:flex; gap:8px;">
        <button class="btn btn-outline" onclick="closeModal('modal-add')">Cancel</button>
        <button class="btn btn-primary" onclick="save()">Save recipe</button>
      </div>
    </div>
  </div>
</div>

<div class="overlay" id="modal-view" onclick="overlayClick(event,'modal-view')">
  <div class="modal">
    <div class="modal-head">
      <h2 id="v-name"></h2>
      <button class="btn btn-ghost" onclick="closeModal('modal-view')">✕</button>
    </div>
    <div class="modal-body">
      <div id="v-meta" style="margin-bottom:15px;"></div>
      <div style="font-weight:600; font-size:12px; margin-bottom:10px; color:var(--ink-light)">INGREDIENTS</div>
      <ul id="v-ingredients" style="margin-bottom:20px; list-style:none;"></ul>
      <div style="font-weight:600; font-size:12px; margin-bottom:10px; color:var(--ink-light)">PREPARATION</div>
      <p class="prep-text" id="v-prep"></p>
    </div>
    <div class="modal-foot" id="view-footer">
      </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
  import { getFirestore, collection, addDoc, getDocs, updateDoc, deleteDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";
  import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAJKH90y8jl9u3BHXZ9USQjysflqP-m8EE",
    authDomain: "my-recipe-book-40408.firebaseapp.com",
    projectId: "my-recipe-book-40408",
    storageBucket: "my-recipe-book-40408.firebasestorage.app",
    messagingSenderId: "297539206913",
    appId: "1:297539206913:web:4e18919e82e3ed1f40e500",
    measurementId: "G-HZT9ME12PF"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);
  const provider = new GoogleAuthProvider();
  const recipesCol = collection(db, "recipes");

  // --- ADMIN SETTINGS ---
  const ADMIN_EMAIL = "your-email@gmail.com"; // <-- CHANGE THIS TO YOUR EMAIL
  let isAdmin = false;
  let recipes = [];
  let editingId = null;
  let viewingId = null;

  // Listen for Auth changes
  onAuthStateChanged(auth, (user) => {
    isAdmin = user && user.email === ADMIN_EMAIL;
    document.getElementById('admin-btn').textContent = user ? `Logout (${user.displayName})` : "Admin Login";
    document.getElementById('admin-btn').onclick = user ? logout : login;
    render(); 
  });

  window.login = async () => await signInWithPopup(auth, provider);
  window.logout = async () => await signOut(auth);

  async function loadRecipes() {
    const q = query(recipesCol, orderBy("name"));
    const snap = await getDocs(q);
    recipes = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    render();
  }

  window.save = async function() {
    const name = document.getElementById('f-name').value.trim();
    if (!name) return;
    const data = {
      name, category: document.getElementById('f-category').value,
      servings: document.getElementById('f-servings').value,
      ingredients: document.getElementById('f-ingredients').value,
      preparation: document.getElementById('f-preparation').value
    };
    editingId ? await updateDoc(doc(db, "recipes", editingId), data) : await addDoc(recipesCol, data);
    closeModal('modal-add');
    loadRecipes();
  };

  window.deleteRecipe = async function() {
    if (!viewingId || !confirm('Delete from cloud?')) return;
    await deleteDoc(doc(db, "recipes", viewingId));
    closeModal('modal-view');
    loadRecipes();
  };

  window.render = function() {
    const q = document.getElementById('search').value.toLowerCase();
    const filtered = recipes.filter(r => r.name.toLowerCase().includes(q));
    const list = document.getElementById('list');
    
    if(!recipes.length) {
      list.innerHTML = `<div style="text-align:center; padding:50px;"><h2>🍳 No recipes yet</h2></div>`;
      return;
    }

    list.innerHTML = '<div class="recipe-grid">' + filtered.map(r => `
      <div class="recipe-card" onclick="openView('${r.id}')">
        ${r.category ? `<div class="card-tag">${esc(r.category)}</div>` : ''}
        <div class="card-name">${esc(r.name)}</div>
      </div>`).join('') + '</div>';
  };

  window.openView = function(id) {
    viewingId = id;
    const r = recipes.find(x => x.id === id);
    document.getElementById('v-name').textContent = r.name;
    document.getElementById('v-meta').innerHTML = `
      ${r.category ? `<span class="pill accent">${esc(r.category)}</span>` : ''}
      ${r.servings ? `<span class="pill">Serves ${esc(r.servings)}</span>` : ''}`;
    document.getElementById('v-ingredients').innerHTML = r.ingredients.split('\n').map(i => `<li>• ${esc(i)}</li>`).join('');
    document.getElementById('v-prep').textContent = r.preparation;
    
    // Authorization Check: Show/Hide Edit & Delete
    const foot = document.getElementById('view-footer');
    foot.innerHTML = `
      ${isAdmin ? `<button class="btn btn-danger" onclick="deleteRecipe()">Delete</button>` : '<div></div>'}
      <div style="display:flex; gap:8px;">
        ${isAdmin ? `<button class="btn btn-outline" onclick="editFromView()">Edit</button>` : ''}
        <button class="btn btn-outline" onclick="closeModal('modal-view')">Close</button>
      </div>`;
    openModal('modal-view');
  };

  window.openAdd = () => { editingId = null; document.getElementById('form-title').textContent = 'New Recipe'; ['name','category','servings','ingredients','preparation'].forEach(f => document.getElementById('f-'+f).value = ''); openModal('modal-add'); };
  window.editFromView = () => { const r = recipes.find(x => x.id === viewingId); closeModal('modal-view'); editingId = r.id; document.getElementById('form-title').textContent = 'Edit Recipe'; document.getElementById('f-name').value = r.name; document.getElementById('f-category').value = r.category; document.getElementById('f-servings').value = r.servings; document.getElementById('f-ingredients').value = r.ingredients; document.getElementById('f-preparation').value = r.preparation; openModal('modal-add'); };
  function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;'); }
  window.openModal = (id) => document.getElementById(id).classList.add('active');
  window.closeModal = (id) => document.getElementById(id).classList.remove('active');
  window.overlayClick = (e, id) => { if (e.target === e.currentTarget) closeModal(id); };
  
  loadRecipes();
</script>
</body>
</html>
